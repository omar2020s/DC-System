{% extends 'base.html' %}{% block title %}RFI Log{% endblock %}{% block content %}<a class="btn btn-success mb-2" href="/export/rfi">Export Excel</a><div class="card p-3 mb-3"><form method="post"><div class="row"><div class="col"><input class="form-control" name="rfi_no" placeholder="RFI No" required></div><div class="col"><input class="form-control" name="subject" placeholder="Subject" required></div><div class="col"><input class="form-control" name="location" placeholder="Location"></div><div class="col"><select class="form-select" name="status"><option>Open</option><option>Answered</option><option>Closed</option></select></div></div><textarea class="form-control mt-2" name="question" placeholder="Question"></textarea><textarea class="form-control mt-2" name="answer" placeholder="Answer"></textarea><button class="btn btn-primary mt-2">Add RFI</button></form></div><div class="card"><table class="table"><tr><th>RFI No</th><th>Subject</th><th>Location</th><th>Status</th><th>Question</th><th>Answer</th></tr>{% for i in items %}<tr><td>{{i.rfi_no}}</td><td>{{i.subject}}</td><td>{{i.location}}</td><td>{{i.status}}</td><td>{{i.question}}</td><td>{{i.answer}}</td></tr>{% endfor %}</table></div>{% endblock %}
