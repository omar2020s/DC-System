{% extends 'base.html' %}{% block title %}Users{% endblock %}{% block content %}<div class="card p-3 mb-3"><form method="post"><div class="row"><div class="col"><input class="form-control" name="username" placeholder="Username" required></div><div class="col"><input class="form-control" name="full_name" placeholder="Full Name" required></div><div class="col"><input class="form-control" name="password" placeholder="Password" required></div><div class="col"><select class="form-select" name="role"><option>admin</option><option>dc</option><option>reviewer</option><option>viewer</option></select></div></div><button class="btn btn-primary mt-2">Create User</button></form></div><div class="card"><table class="table"><tr><th>Username</th><th>Name</th><th>Role</th></tr>{% for u in users %}<tr><td>{{u.username}}</td><td>{{u.full_name}}</td><td>{{u.role}}</td></tr>{% endfor %}</table></div>{% endblock %}
