{% extends 'base.html' %}{% block title %}Transmittals{% endblock %}{% block content %}<div class="card p-3 mb-3"><form method="post" action="/transmittals/add"><div class="row"><div class="col"><input class="form-control" name="transmittal_no" placeholder="TR-CIV-0001" required></div><div class="col"><select class="form-select" name="document_id">{% for d in docs %}<option value="{{d.id}}">{{d.doc_no}} - {{d.title}}</option>{% endfor %}</select></div><div class="col"><input class="form-control" name="sent_to" placeholder="Sent To" required></div><div class="col"><select class="form-select" name="purpose"><option>For Approval</option><option>For Review</option><option>For Information</option><option>For Construction</option></select></div></div><textarea class="form-control mt-2" name="remarks" placeholder="Remarks"></textarea><button class="btn btn-primary mt-2">Create Transmittal</button></form></div><div class="card"><table class="table"><thead><tr><th>No</th><th>Document</th><th>To</th><th>Purpose</th><th>Date</th><th>PDF</th></tr></thead><tbody>{% for t in items %}<tr><td>{{t.transmittal_no}}</td><td>{{t.document.doc_no}}</td><td>{{t.sent_to}}</td><td>{{t.purpose}}</td><td>{{t.created_at.strftime('%Y-%m-%d')}}</td><td><a href="/transmittals/{{t.id}}/pdf">Print PDF</a></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
