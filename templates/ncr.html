{% extends 'base.html' %}{% block title %}NCR Log{% endblock %}{% block content %}<a class="btn btn-success mb-2" href="/export/ncr">Export Excel</a><div class="card p-3 mb-3"><form method="post"><div class="row"><div class="col"><input class="form-control" name="ncr_no" placeholder="NCR No" required></div><div class="col"><input class="form-control" name="location" placeholder="Location"></div><div class="col"><select class="form-select" name="status"><option>Open</option><option>Under Corrective Action</option><option>Closed</option></select></div></div><textarea class="form-control mt-2" name="description" placeholder="Description" required></textarea><textarea class="form-control mt-2" name="root_cause" placeholder="Root Cause"></textarea><textarea class="form-control mt-2" name="corrective_action" placeholder="Corrective Action"></textarea><button class="btn btn-primary mt-2">Add NCR</button></form></div><div class="card"><table class="table"><tr><th>NCR No</th><th>Description</th><th>Location</th><th>Status</th><th>Root Cause</th><th>Corrective Action</th></tr>{% for i in items %}<tr><td>{{i.ncr_no}}</td><td>{{i.description}}</td><td>{{i.location}}</td><td>{{i.status}}</td><td>{{i.root_cause}}</td><td>{{i.corrective_action}}</td></tr>{% endfor %}</table></div>{% endblock %}
