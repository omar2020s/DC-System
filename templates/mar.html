{% extends 'base.html' %}{% block title %}MAR Log{% endblock %}{% block content %}<a class="btn btn-success mb-2" href="/export/mar">Export Excel</a><div class="card p-3 mb-3"><form method="post"><div class="row"><div class="col"><input class="form-control" name="mar_no" placeholder="MAR No" required></div><div class="col"><input class="form-control" name="material" placeholder="Material" required></div><div class="col"><input class="form-control" name="supplier" placeholder="Supplier"></div><div class="col"><input class="form-control" name="discipline" value="Civil"></div><div class="col"><select class="form-select" name="status"><option>Submitted</option><option>Under Review</option><option>Approved</option><option>Rejected</option></select></div></div><textarea class="form-control mt-2" name="remarks" placeholder="Remarks"></textarea><button class="btn btn-primary mt-2">Add MAR</button></form></div><div class="card"><table class="table"><tr><th>MAR No</th><th>Material</th><th>Supplier</th><th>Discipline</th><th>Status</th><th>Remarks</th></tr>{% for i in items %}<tr><td>{{i.mar_no}}</td><td>{{i.material}}</td><td>{{i.supplier}}</td><td>{{i.discipline}}</td><td>{{i.status}}</td><td>{{i.remarks}}</td></tr>{% endfor %}</table></div>{% endblock %}
