{% extends 'base.html' %}{% block title %}{{ 'Edit' if doc else 'Add' }} Document{% endblock %}{% block content %}<div class="card p-3"><form method="post" enctype="multipart/form-data"><div class="row"><div class="col-md-4"><label>Doc No</label><input class="form-control" name="doc_no" value="{{doc.doc_no if doc else ''}}" {% if doc %}readonly{% endif %} required></div><div class="col-md-8"><label>Title</label><input class="form-control" name="title" value="{{doc.title if doc else ''}}" required></div></div><div class="row mt-2"><div class="col"><label>Discipline</label><select class="form-select" name="discipline">{% for x in ['Civil','Mechanical','Electrical','Instrumentation','QA/QC','HSE'] %}<option {% if doc and doc.discipline==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select></div><div class="col"><label>Type</label><select class="form-select" name="doc_type">{% for x in ['Shop Drawing','Method Statement','Material Submittal','RFI','NCR','Inspection Report','Test Report'] %}<option {% if doc and doc.doc_type==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select></div><div class="col"><label>Revision</label><input class="form-control" name="revision" value="{{doc.revision if doc else 'Rev.0'}}"></div></div><div class="row mt-2"><div class="col"><label>Status</label><select class="form-select" name="status">{% for x in ['Draft','Submitted','Under Review','Approved','Approved with Comments','Rejected'] %}<option {% if doc and doc.status==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select></div><div class="col"><label>Workflow Step</label><select class="form-select" name="workflow_step">{% for x in ['Document Controller','Consultant Review','Client Review','Contractor Revision','Closed'] %}<option {% if doc and doc.workflow_step==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select></div><div class="col"><label>Submitted To</label><input class="form-control" name="submitted_to" value="{{doc.submitted_to if doc else ''}}"></div></div><div class="mt-2"><label>Upload File</label><input class="form-control" type="file" name="file"></div><button class="btn btn-primary mt-3">Save</button></form></div>{% endblock %}
