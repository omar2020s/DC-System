{% extends 'base.html' %}{% block title %}Dashboard{% endblock %}{% block content %}<div class="row g-3"><div class="col"><div class="card p-3"><b>Total Documents</b><h2>{{data.documents}}</h2></div></div><div class="col"><div class="card p-3"><b>Approved</b><h2>{{data.approved}}</h2></div></div><div class="col"><div class="card p-3"><b>Under Review</b><h2>{{data.review}}</h2></div></div><div class="col"><div class="card p-3"><b>Rejected</b><h2>{{data.rejected}}</h2></div></div></div><div class="row mt-4"><div class="col-md-6"><div class="card p-3"><canvas id="statusChart"></canvas></div></div><div class="col-md-6"><div class="card p-3"><canvas id="logsChart"></canvas></div></div></div><script>new Chart(document.getElementById('statusChart'),{type:'bar',data:{labels:['Approved','Under Review','Rejected'],datasets:[{label:'Documents',data:[{{data.approved}},{{data.review}},{{data.rejected}}]}]}});new Chart(document.getElementById('logsChart'),{type:'pie',data:{labels:['MAR','RFI','NCR'],datasets:[{data:[{{data.mar}},{{data.rfi}},{{data.ncr}}]}]}});</script>{% endblock %}
